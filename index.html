<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>Offer Vault</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;color-scheme:light dark}
    body{margin:0;background:#f2f2f7;color:#111}header{position:sticky;top:0;background:rgba(242,242,247,.92);backdrop-filter:blur(16px);padding:calc(12px + env(safe-area-inset-top)) 16px 12px;z-index:5}h1{margin:0;font-size:30px}.sub{color:#666;margin-top:3px}main{padding:12px 14px calc(90px + env(safe-area-inset-bottom))}.card{background:#fff;border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 1px 4px #0001}.urgent{border-left:6px solid #ff3b30}.soon{border-left:6px solid #ff9f0a}.later{border-left:6px solid #34c759}.row{display:flex;gap:10px;align-items:center;justify-content:space-between}.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#e5e5ea;font-size:13px}button{border:0;border-radius:12px;padding:11px 14px;font-weight:650;background:#007aff;color:white}button.secondary{background:#e5e5ea;color:#111}input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #d1d1d6;border-radius:12px;padding:11px;background:#fff;color:#111;font-size:16px}label{font-size:13px;color:#666;display:block;margin:10px 0 5px}.fab{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));width:60px;height:60px;border-radius:50%;font-size:34px;box-shadow:0 6px 20px #0003}dialog{border:0;border-radius:20px;width:min(92vw,520px);padding:0}dialog::backdrop{background:#0008}form{padding:18px}img.thumb{width:78px;height:78px;object-fit:cover;border-radius:12px}.muted{color:#777}nav{display:flex;gap:8px;overflow:auto;padding:4px 0 8px}nav button{white-space:nowrap;background:#e5e5ea;color:#111}nav button.active{background:#111;color:#fff}@media(prefers-color-scheme:dark){body,header{background:#000;color:#fff}.card,input,textarea,select{background:#1c1c1e;color:#fff;border-color:#3a3a3c}.sub,.muted,label{color:#aaa}.pill,button.secondary,nav button{background:#2c2c2e;color:#fff}}
  </style>
</head>
<body>
<header><h1>Offer Vault</h1><div class="sub" id="summary">Loading offers…</div></header>
<main><nav><button class="active" data-view="active">Active</button><button data-view="today">Today</button><button data-view="week">7 Days</button><button data-view="redeemed">Redeemed</button><button data-view="reports">Reports</button></nav><section id="content"></section></main>
<button class="fab" id="addBtn" aria-label="Add offer">+</button>
<dialog id="offerDialog"><form method="dialog" id="offerForm"><h2 id="formTitle">Add Offer</h2><input type="hidden" id="offerId"><label>Receipt photo</label><input id="photo" type="file" accept="image/*" capture="environment"><label>Store</label><input id="store" required placeholder="Wendy's"><label>Offer</label><input id="offer" required placeholder="$2 off any premium combo"><label>Expiration date</label><input id="expires" type="date" required><label>Estimated savings</label><input id="value" type="number" min="0" step=".01" placeholder="2.00"><label>Receipt required?</label><select id="receiptRequired"><option value="yes">Yes</option><option value="no">No</option></select><label>Notes / pasted Live Text</label><textarea id="notes" rows="4" placeholder="Restrictions, validation code, survey terms…"></textarea><div class="row" style="margin-top:16px"><button type="button" class="secondary" id="cancelBtn">Cancel</button><button value="default">Save Offer</button></div></form></dialog>
<script>
const DB='offerVaultDB',STORE='offers';let db,currentView='active';
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE,{keyPath:'id'});r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
function tx(m='readonly'){return db.transaction(STORE,m).objectStore(STORE)}function all(){return new Promise((res,rej)=>{const r=tx().getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}function put(x){return new Promise((res,rej)=>{const r=tx('readwrite').put(x);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}function del(id){return new Promise((res,rej)=>{const r=tx('readwrite').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
function daysLeft(d){return Math.ceil((new Date(d+'T23:59:59')-new Date())/86400000)}function esc(s=''){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function money(v){return '$'+Number(v||0).toFixed(2)}
async function render(){const items=await all();const active=items.filter(x=>!x.redeemed&&daysLeft(x.expires)>=0).sort((a,b)=>a.expires.localeCompare(b.expires));summary.textContent=`${active.length} active • ${money(active.reduce((s,x)=>s+Number(x.value||0),0))} possible savings`;const c=content;if(currentView==='reports'){const used=items.filter(x=>x.redeemed),month=new Date().toISOString().slice(0,7),monthly=used.filter(x=>(x.redeemedAt||'').startsWith(month));c.innerHTML=`<div class="card"><h2>Savings report</h2><p><b>This month:</b> ${money(monthly.reduce((s,x)=>s+Number(x.value||0),0))}</p><p><b>All time:</b> ${money(used.reduce((s,x)=>s+Number(x.value||0),0))}</p><p><b>Offers redeemed:</b> ${used.length}</p><div class="row"><button onclick="exportCSV()">Export CSV</button><button class="secondary" onclick="backup()">Backup JSON</button></div></div>`;return}let list=items;if(currentView==='active')list=active;if(currentView==='today')list=active.filter(x=>daysLeft(x.expires)<=0);if(currentView==='week')list=active.filter(x=>daysLeft(x.expires)<=7);if(currentView==='redeemed')list=items.filter(x=>x.redeemed).sort((a,b)=>(b.redeemedAt||'').localeCompare(a.redeemedAt||''));if(!list.length){c.innerHTML='<div class="card"><b>No offers here.</b><p class="muted">Tap + to photograph or upload a receipt.</p></div>';return}c.innerHTML=list.map(x=>{const d=daysLeft(x.expires),cls=d<=1?'urgent':d<=7?'soon':'later',count=x.redeemed?'Redeemed':d<0?'Expired':d===0?'Last day':`${d} day${d===1?'':'s'} left`;return `<article class="card ${cls}"><div class="row"><div><h3>${esc(x.store)}</h3><div>${esc(x.offer)}</div></div>${x.photo?`<img class="thumb" src="${x.photo}">`:''}</div><p><span class="pill">${count}</span> <span class="pill">${esc(x.expires)}</span> <span class="pill">${money(x.value)}</span></p>${x.receiptRequired==='yes'?'<p><b>Bring original receipt</b></p>':''}${x.notes?`<p class="muted">${esc(x.notes)}</p>`:''}<div class="row"><button class="secondary" onclick="editOffer('${x.id}')">Edit</button>${!x.redeemed?`<button onclick="redeem('${x.id}')">Mark Used</button>`:`<button class="secondary" onclick="removeOffer('${x.id}')">Delete</button>`}<button class="secondary" onclick="calendar('${x.id}')">Calendar</button></div></article>`}).join('')}
async function fileToDataURL(f){if(!f)return'';return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsDataURL(f)})}
addBtn.onclick=()=>{offerForm.reset();offerId.value='';formTitle.textContent='Add Offer';offerDialog.showModal()};cancelBtn.onclick=()=>offerDialog.close();offerForm.onsubmit=async e=>{e.preventDefault();const id=offerId.value||crypto.randomUUID(),existing=(await all()).find(x=>x.id===id)||{},photoData=photo.files[0]?await fileToDataURL(photo.files[0]):existing.photo||'';await put({...existing,id,photo:photoData,store:store.value.trim(),offer:offer.value.trim(),expires:expires.value,value:value.value||0,receiptRequired:receiptRequired.value,notes:notes.value.trim(),redeemed:existing.redeemed||false,createdAt:existing.createdAt||new Date().toISOString()});offerDialog.close();render()}
async function editOffer(id){const x=(await all()).find(y=>y.id===id);if(!x)return;offerId.value=x.id;store.value=x.store;offer.value=x.offer;expires.value=x.expires;value.value=x.value;receiptRequired.value=x.receiptRequired;notes.value=x.notes||'';photo.value='';formTitle.textContent='Edit Offer';offerDialog.showModal()}async function redeem(id){const x=(await all()).find(y=>y.id===id);x.redeemed=true;x.redeemedAt=new Date().toISOString();await put(x);render()}async function removeOffer(id){if(confirm('Delete this offer?')){await del(id);render()}}
async function calendar(id){const x=(await all()).find(y=>y.id===id),dt=x.expires.replaceAll('-','')+'T170000',text=`Use ${x.store} offer: ${x.offer}`,details=`Estimated savings ${money(x.value)}. ${x.receiptRequired==='yes'?'Bring original receipt. ':''}${x.notes||''}`,ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nBEGIN:VEVENT\r\nDTSTART:${dt}\r\nDTEND:${dt}\r\nSUMMARY:${text.replace(/,/g,'\\,')}\r\nDESCRIPTION:${details.replace(/\n/g,' ').replace(/,/g,'\\,')}\r\nBEGIN:VALARM\r\nTRIGGER:-P2D\r\nACTION:DISPLAY\r\nDESCRIPTION:Offer expires in 2 days\r\nEND:VALARM\r\nEND:VEVENT\r\nEND:VCALENDAR`;download(new Blob([ics],{type:'text/calendar'}),`${x.store}-offer.ics`)}
function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}async function exportCSV(){const xs=await all(),rows=[['Store','Offer','Expires','Value','Redeemed','Redeemed At','Notes'],...xs.map(x=>[x.store,x.offer,x.expires,x.value,x.redeemed,x.redeemedAt||'',x.notes||''])],csv=rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');download(new Blob([csv],{type:'text/csv'}),'offer-vault.csv')}async function backup(){download(new Blob([JSON.stringify(await all(),null,2)],{type:'application/json'}),'offer-vault-backup.json')}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentView=b.dataset.view;render()});if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');openDB().then(x=>{db=x;render()});
</script></body></html>
