name: iOS Build Check

on:
  push:
    paths:
      - 'NativeApp/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    paths:
      - 'NativeApp/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Offer Vault for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project NativeApp/OfferVault.xcodeproj \
            -scheme OfferVault \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            clean build
